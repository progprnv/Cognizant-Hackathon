version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     fraud_user
      POSTGRES_PASSWORD: fraud_pass
      POSTGRES_DB:       fraud_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_db"]
      interval: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── FraudShield Backend ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud_user:fraud_pass@db:5432/fraud_db
      REDIS_URL:    redis://redis:6379/0
      DEBUG:        "false"
      SECRET_KEY:   "change-me-in-production-please"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - model_cache:/app/backend/ml/saved_models
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4

volumes:
  pg_data:
  model_cache:
